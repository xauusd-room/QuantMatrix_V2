<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuantMatrix V2</title>

<style>
body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: Arial;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #38bdf8;
}

.card {
    background: #1e293b;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
}

.buy { border-left: 4px solid #22c55e; }
.sell { border-left: 4px solid #ef4444; }

.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.box {
    background: #111827;
    padding: 10px;
    border-radius: 10px;
    flex: 1;
}
</style>
</head>

<body>

<h1>📊 QuantMatrix V2 Dashboard</h1>

<div class="stats">
    <div class="box" id="totalTrades">Trades: 0</div>
</div>

<div id="trades"></div>

<script>

const API = "https://yellow-violet-e1d0.aaa375750526.workers.dev";

async function loadData() {
    try {
        const res = await fetch(API);
        const data = await res.json();

        const trades = data.trades || [];

        document.getElementById("totalTrades").innerText =
            "Trades: " + trades.length;

        const container = document.getElementById("trades");
        container.innerHTML = "";

        trades.slice().reverse().forEach(t => {

            const div = document.createElement("div");
            div.className = "card " + (t.type === "BUY" ? "buy" : "sell");

            div.innerHTML = `
                <b>${t.symbol} ${t.type}</b><br>
                Price: ${t.price}<br>
                SL: ${t.sl} | TP: ${t.tp}<br>
                Time: ${t.time}
            `;

            container.appendChild(div);
        });

    } catch (e) {
        console.log("API error", e);
    }
}

// 自动刷新
setInterval(loadData, 3000);
loadData();

</script>

</body>
</html>
