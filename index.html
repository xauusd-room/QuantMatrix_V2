<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EA Signal Test</title>

<style>
body{
    background:#0f172a;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>MT4 EA Signal Live</h2>

<div id="signal">等待信号...</div>

<script>

async function loadSignal(){

    try{
        const res = await fetch("https://yellow-violet-e1d0.aaa375750526.workers.dev/api/latest");
        const data = await res.json();

        if(!data.symbol){
            document.getElementById("signal").innerHTML = "暂无信号";
            return;
        }

        document.getElementById("signal").innerHTML = `
            <div class="card">
                <div>品种：${data.symbol}</div>
                <div>方向：${data.type}</div>
                <div>价格：${data.price}</div>
            </div>
        `;

    } catch(e){
        document.getElementById("signal").innerHTML = "连接失败";
    }
}

setInterval(loadSignal, 2000);
loadSignal();

</script>

</body>
</html>
