<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔴 QUANT MATRIX TERMINAL - XAUUSD</title>
    <style>
        * {
            box-sizing: border-box;
        }

        /* 🌌 核心地雷：赛博朋克深邃科技感背景（自带高精密雷达网格线条） */
        body {
            margin: 0;
            background-color: #030712;
            background-image: linear-gradient(rgba(16, 185, 129, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(16, 185, 129, 0.02) 1px, transparent 1px);
            background-size: 20px 20px; /* 精密网格线大小 */
            font-family: "SF Pro Display", -apple-system, "Segoe UI", Roboto, Helvetica, sans-serif;
            color: #e5e7eb;
            padding-bottom: 60px;
        }

        /* ==================== 🏢 顶部航天级悬浮磨砂导航栏 ==================== */
        .header {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px); /* 磨砂玻璃特效 */
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
        }

        .logo span {
            color: #38bdf8;
        }

        .nav a {
            color: #9ca3af;
            margin-left: 25px;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav a:hover, .nav a.active {
            color: #38bdf8;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.8);
        }

        /* ==================== 🎛️ 荧光科幻数据面板 ==================== */
        .monitor-panel {
            max-width: 1100px;
            margin: 40px auto 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 20px;
        }

        .monitor-card {
            background: rgba(17, 24, 39, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: 0.3s ease;
        }

        /* 炫酷边缘流光暗影 */
        .monitor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #38bdf8, #0369a1);
        }

        .monitor-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(56, 189, 248, 0.1);
        }

        .monitor-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .monitor-value {
            font-size: 32px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: -1px;
        }

        /* 🪙 实时液晶发光金价 */
        #live-gold-price {
            color: #38bdf8;
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
            transition: color 0.1s;
        }

        .price-up {
            color: #00ff88 !important;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.6) !important;
        }

        .price-down {
            color: #ff3366 !important;
            text-shadow: 0 0 15px rgba(255, 51, 102, 0.6) !important;
        }

        #live-online-users {
            color: #f43f5e;
            text-shadow: 0 0 12px rgba(244, 63, 94, 0.4);
        }

        .status-on {
            color: #00ff88;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
            font-size: 18px;
        }

        .status-on::before {
            content: "●";
            animation: blink 1s infinite;
            color: #00ff88;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.2;
                transform: scale(0.9);
            }
        }

        /* ==================== 📊 量子多空博弈进度条 ==================== */
        .vs-box {
            max-width: 1100px;
            margin: 40px auto;
            background: rgba(17, 24, 39, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .vs-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .vs-bar-container {
            width: 100%;
            height: 14px; /* 变细更显精致工业感 */
            background: #ff3366;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* 中间激光分割线 */
        .vs-bar-container::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: #fff;
            z-index: 10;
            opacity: 0.4;
        }

        .vs-bar-bull {
            width: 50%;
            height: 100%;
            background: #00ff88;
            transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* ==================== 📜 矩阵式智能时间轴 ==================== */
        .live-stream-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .stream-title {
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #38bdf8;
        }

        .stream-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: #38bdf8;
            box-shadow: 0 0 8px #38bdf8;
        }

        .analysis-card {
            background: rgba(17, 24, 39, 0.45);
            border: 1px solid rgba(56, 189, 248, 0.1);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .analysis-card::after {
            content: 'QUANT MATRIX ENG';
            position: absolute;
            right: 25px;
            top: 20px;
            font-size: 10px;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.05);
            letter-spacing: 2px;
        }

        .analysis-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #6b7280;
            font-size: 12px;
            font-family: monospace;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .analysis-meta .tag {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.2);
            color: #00ff88;
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .analysis-h2 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 20px 0;
            color: #fff;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        .analysis-body {
            font-size: 16px;
            line-height: 1.9;
            color: #9ca3af;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .analysis-img-box {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            background: #030712;
        }

        .analysis-img-box img {
            width: 100%;
            display: block;
            filter: saturate(1.1) contrast(1.05); /* 让图表色彩更硬核 */
        }
    </style>
</head>
